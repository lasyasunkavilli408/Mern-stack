<!DOCTYPE html>
<html>
<head>
	<title>Largest of Three numbers</title>
</head>
<body>
<h3>Largest Of three numbers</h3>
<script>
	var a=parseInt(prompt("Enter first number:"));
	var b=parseInt(prompt("Enter 2nd number:"));
	var c=parseInt(prompt("Enter 3rd number:"));

	if(a===b && b===c){
	document.write("EQUAL NUMBERS");
	alert("EQUAL NUMBERS");
	} 
	else if(a>=b && a>=c){
	document.write(a+"IS LARGER NUMBER");
	alert(a+"IS LARGER NUMBER");
	} 
	else if(b>=a && b>=c){
	document.write(b+" IS LARGER NUMBER");
	alert(b+" IS LARGER NUMBER");
	} 
	else{
	document.write(c+" IS LARGER NUMBER");
	alert(c+" IS LARGER NUMBER");
	} 

</script>
</body>
</html>
